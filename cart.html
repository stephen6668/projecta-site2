<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warenkorb – LUXE NOIR</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--black:#0A0A0A;--black-soft:#141414;--black-card:#1A1A1A;--white:#F5F0E8;--gray:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Josefin Sans',sans-serif;font-weight:300;min-height:100vh;}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,10,10,0.97);border-bottom:1px solid rgba(201,168,76,0.3);padding:0 2rem;height:70px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px);}
.logo-area{display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none;}
.logo-img{width:44px;height:44px;object-fit:contain;}
.logo-placeholder{width:44px;height:44px;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold);font-style:italic;}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:1.5rem;letter-spacing:6px;color:var(--gold);font-weight:300;}
.header-actions{display:flex;align-items:center;gap:1.5rem;}
.cart-btn{background:none;border:1px solid rgba(201,168,76,0.4);color:var(--gold);padding:8px 16px;font-family:'Josefin Sans',sans-serif;font-size:0.7rem;letter-spacing:2px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:8px;}
.cart-btn:hover{background:rgba(201,168,76,0.1);border-color:var(--gold);}
.cart-count{background:var(--gold);color:var(--black);border-radius:50%;width:18px;height:18px;font-size:.65rem;display:flex;align-items:center;justify-content:center;}
.hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:5px;background:none;border:none;}
.hamburger span{display:block;width:26px;height:1.5px;background:var(--gold);transition:all .3s;}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}

/* NAV */
.nav-menu{position:fixed;top:70px;left:0;right:0;bottom:0;background:rgba(10,10,10,0.99);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;transform:translateX(-100%);transition:transform .5s cubic-bezier(.77,0,.18,1);border-top:1px solid rgba(201,168,76,0.2);}
.nav-menu.open{transform:translateX(0);}
.nav-menu a{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;color:var(--white);text-decoration:none;letter-spacing:8px;transition:color .3s;position:relative;}
.nav-menu a:hover{color:var(--gold);}
.nav-divider{width:40px;height:1px;background:rgba(201,168,76,0.3);}

/* BREADCRUMB */
.breadcrumb{padding:90px 3rem 0;font-size:.6rem;letter-spacing:3px;color:var(--gray);}
.breadcrumb a{color:var(--gray);text-decoration:none;transition:color .3s;}
.breadcrumb a:hover{color:var(--gold);}
.breadcrumb span{color:var(--gold);margin:0 8px;}

/* MAIN */
.cart-container{max-width:1000px;margin:0 auto;padding:3rem 2rem 6rem;}
.cart-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:3rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(201,168,76,0.2);}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3rem);letter-spacing:8px;font-weight:300;}
.cart-title span{color:var(--gold);font-style:italic;}
.cart-meta{font-size:.65rem;letter-spacing:2px;color:var(--gray);}

/* PROMO */
.promo-row{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;padding:1.2rem 1.5rem;border:1px solid rgba(201,168,76,0.2);background:rgba(201,168,76,0.03);margin-bottom:2rem;}
.promo-label{font-size:.6rem;letter-spacing:3px;color:var(--gold);}
.promo-input{background:none;border:none;border-bottom:1px solid rgba(201,168,76,0.4);color:var(--white);padding:6px 8px;width:160px;font-family:'Josefin Sans',sans-serif;font-size:.75rem;letter-spacing:2px;outline:none;text-transform:uppercase;}
.promo-input::placeholder{color:var(--gray);text-transform:none;}
.promo-btn{background:var(--gold);color:var(--black);border:none;padding:8px 20px;font-family:'Josefin Sans',sans-serif;font-size:.65rem;letter-spacing:2px;cursor:pointer;transition:background .3s;}
.promo-btn:hover{background:var(--gold-light);}
.promo-msg{font-size:.7rem;letter-spacing:1px;}
.promo-ok{color:#4CAF50;}
.promo-err{color:#f44336;}

/* ITEMS */
.cart-items{border-top:1px solid rgba(201,168,76,0.15);}
.cart-empty{text-align:center;padding:6rem 0;}
.cart-empty p{font-size:.8rem;letter-spacing:3px;color:var(--gray);margin-bottom:2rem;}
.empty-icon{font-size:4rem;margin-bottom:1.5rem;opacity:.2;}
.continue-btn{display:inline-block;padding:14px 40px;border:1px solid var(--gold);color:var(--gold);font-family:'Josefin Sans',sans-serif;font-size:.7rem;letter-spacing:4px;cursor:pointer;background:none;transition:all .3s;text-decoration:none;}
.continue-btn:hover{background:var(--gold);color:var(--black);}

.cart-item{display:grid;grid-template-columns:90px 1fr auto;gap:1.5rem;align-items:start;padding:1.8rem 0;border-bottom:1px solid rgba(201,168,76,0.1);animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.item-img{width:90px;height:120px;background:var(--black-card);display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0;cursor:pointer;transition:opacity .3s;}
.item-img:hover{opacity:.8;}
.item-details{}
.item-cat{font-size:.55rem;letter-spacing:3px;color:var(--gold);opacity:.7;margin-bottom:4px;}
.item-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;letter-spacing:3px;font-weight:300;margin-bottom:6px;cursor:pointer;transition:color .3s;}
.item-name:hover{color:var(--gold);}
.item-color{font-size:.6rem;letter-spacing:2px;color:var(--gray);margin-bottom:12px;}
.item-qty{display:flex;align-items:center;gap:12px;}
.qty-btn{width:28px;height:28px;border:1px solid rgba(201,168,76,0.4);background:none;color:var(--gold);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.qty-btn:hover{background:rgba(201,168,76,0.1);}
.qty-num{font-size:.8rem;letter-spacing:1px;min-width:24px;text-align:center;}
.item-remove{font-size:.6rem;letter-spacing:2px;color:var(--gray);background:none;border:none;cursor:pointer;transition:color .3s;margin-top:10px;display:block;padding:0;}
.item-remove:hover{color:#f44336;}
.item-right{text-align:right;}
.item-price{font-family:'Cormorant Garamond',serif;font-size:1.3rem;letter-spacing:2px;color:var(--gold);}
.item-original{font-size:.75rem;color:var(--gray);text-decoration:line-through;margin-top:3px;}

/* LAYOUT */
.cart-layout{display:grid;grid-template-columns:1fr 380px;gap:3rem;align-items:start;}
@media(max-width:768px){.cart-layout{grid-template-columns:1fr;}.cart-item{grid-template-columns:80px 1fr auto;gap:1rem;}}

/* SUMMARY */
.summary-box{border:1px solid rgba(201,168,76,0.2);background:var(--black-card);padding:2rem;position:sticky;top:90px;}
.summary-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:5px;font-weight:300;margin-bottom:1.5rem;color:var(--white);}
.summary-row{display:flex;justify-content:space-between;padding:10px 0;font-size:.72rem;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--gray);}
.summary-row.discount{color:#4CAF50;}
.summary-total{display:flex;justify-content:space-between;padding:18px 0 0;font-family:'Cormorant Garamond',serif;font-size:1.5rem;letter-spacing:3px;color:var(--gold);}
.checkout-btn{width:100%;background:var(--gold);color:var(--black);border:none;padding:16px;margin-top:1.5rem;font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:4px;cursor:pointer;transition:background .3s;text-transform:uppercase;}
.checkout-btn:hover{background:var(--gold-light);}
.secure-note{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:1rem;font-size:.6rem;letter-spacing:2px;color:var(--gray);}
.secure-note::before{content:'🔒';font-size:.8rem;}
.payment-icons{display:flex;gap:8px;margin-top:1.2rem;justify-content:center;}
.pay-icon{border:1px solid rgba(255,255,255,0.1);padding:5px 12px;font-size:.6rem;letter-spacing:1px;color:var(--gray);}

/* FOOTER */
footer{border-top:1px solid rgba(201,168,76,0.2);padding:3rem;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1rem;}
.footer-copy{font-size:.6rem;letter-spacing:1px;color:var(--gray);}
.footer-links{display:flex;gap:1.5rem;flex-wrap:wrap;}
.footer-links a{font-size:.6rem;letter-spacing:1px;color:var(--gray);text-decoration:none;transition:color .3s;}
.footer-links a:hover{color:var(--gold);}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;z-index:3000;background:var(--black-card);border:1px solid var(--gold);padding:1rem 1.5rem;font-size:.7rem;letter-spacing:2px;color:var(--gold);transform:translateY(100px);opacity:0;transition:all .4s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

/* AUTH MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--black-card);border:1px solid rgba(201,168,76,0.3);padding:3rem;width:100%;max-width:440px;position:relative;}
.modal-close{position:absolute;top:1rem;right:1.5rem;background:none;border:none;color:var(--gray);font-size:1.5rem;cursor:pointer;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;letter-spacing:5px;font-weight:300;color:var(--gold);margin-bottom:2rem;text-align:center;}
.form-group{margin-bottom:1.5rem;}
.form-label{display:block;font-size:.6rem;letter-spacing:3px;color:var(--gray);margin-bottom:8px;}
.form-input{width:100%;background:rgba(255,255,255,.03);border:none;border-bottom:1px solid rgba(201,168,76,0.3);color:var(--white);padding:10px 4px;font-family:'Josefin Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .3s;letter-spacing:1px;}
.form-input:focus{border-color:var(--gold);}
.form-btn{width:100%;background:var(--gold);color:var(--black);border:none;padding:14px;font-family:'Josefin Sans',sans-serif;font-size:.7rem;letter-spacing:4px;cursor:pointer;transition:background .3s;}
.form-btn:hover{background:var(--gold-light);}
.form-switch{text-align:center;margin-top:1.5rem;font-size:.65rem;letter-spacing:1px;color:var(--gray);}
.form-switch a{color:var(--gold);cursor:pointer;}
.form-msg{font-size:.7rem;text-align:center;margin-top:1rem;letter-spacing:1px;min-height:20px;}
</style>
</head>
<body>

<header>
  <a class="logo-area" href="index.html">
    <img src="logo.png" alt="LUXE NOIR" class="logo-img" onerror="this.style.display='none';document.getElementById('logofallback').style.display='flex'">
    <div class="logo-placeholder" id="logofallback" style="display:none">L</div>
    <span class="logo-text">LUXE NOIR</span>
  </a>
  <div class="header-actions">
    <button class="cart-btn" onclick="window.location='cart.html'">
      ⊡ WARENKORB <span class="cart-count" id="cartCount">0</span>
    </button>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<nav class="nav-menu" id="navMenu">
  <a href="index.html">HOME</a>
  <div class="nav-divider"></div>
  <a href="index.html#kollektion">KOLLEKTION</a>
  <div class="nav-divider"></div>
  <a href="cart.html">WARENKORB</a>
  <div class="nav-divider"></div>
  <a href="#" onclick="openAuth()">ANMELDEN</a>
  <div class="nav-divider"></div>
  <a href="impressum.html">IMPRESSUM</a>
</nav>

<div class="breadcrumb">
  <a href="index.html">HOME</a><span>›</span>WARENKORB
</div>

<div class="cart-container">
  <div class="cart-header">
    <h1 class="cart-title">MEIN <span>WARENKORB</span></h1>
    <span class="cart-meta" id="itemCountLabel"></span>
  </div>

  <div class="promo-row">
    <span class="promo-label">AKTIONSCODE</span>
    <input class="promo-input" id="promoInput" placeholder="Code eingeben" maxlength="20">
    <button class="promo-btn" onclick="applyPromo()">ANWENDEN</button>
    <span class="promo-msg" id="promoMsg"></span>
  </div>

  <div id="cartMain"></div>
</div>

<footer>
  <span class="footer-copy">© 2025 LUXE NOIR GmbH. Alle Rechte vorbehalten.</span>
  <div class="footer-links">
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
    <a href="agb.html">AGB</a>
    <a href="widerruf.html">Widerruf</a>
  </div>
</footer>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">×</button>
    <h2 class="modal-title">ANMELDEN</h2>
    <div class="form-group">
      <label class="form-label">E-MAIL</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="ihre@email.de">
    </div>
    <div class="form-group">
      <label class="form-label">PASSWORT</label>
      <input class="form-input" id="loginPass" type="password" placeholder="••••••••">
    </div>
    <button class="form-btn" onclick="doLogin()">EINLOGGEN</button>
    <p class="form-msg" id="loginMsg"></p>
    <p class="form-switch">Noch kein Konto? <a href="index.html">Registrieren</a></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_EMAIL="admin@luxenoir.de";
const ADMIN_PASS="LuxeAdmin2025!";
let cart=JSON.parse(localStorage.getItem('lnCart')||'[]');
let promoCodes=JSON.parse(localStorage.getItem('lnPromoCodes')||'[{"code":"WELCOME10","percent":10},{"code":"VIP20","percent":20}]');
let appliedPromo=JSON.parse(localStorage.getItem('lnAppliedPromo')||'null');
let users=JSON.parse(localStorage.getItem('lnUsers')||'[]');
let currentUser=JSON.parse(localStorage.getItem('lnCurrentUser')||'null');

function saveCart(){localStorage.setItem('lnCart',JSON.stringify(cart));updateCount();}
function updateCount(){
  const t=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent=t;
}

function renderCart(){
  const el=document.getElementById('cartMain');
  updateCount();
  const label=document.getElementById('itemCountLabel');
  const total=cart.reduce((s,i)=>s+i.qty,0);
  label.textContent=total+' ARTIKEL';

  if(appliedPromo){
    document.getElementById('promoInput').value=appliedPromo.code;
    document.getElementById('promoMsg').textContent='✓ −'+appliedPromo.percent+'% AKTIV';
    document.getElementById('promoMsg').className='promo-msg promo-ok';
  }

  if(!cart.length){
    el.innerHTML=`<div class="cart-empty"><div class="empty-icon">⊡</div><p>IHR WARENKORB IST LEER</p><a class="continue-btn" href="index.html">KOLLEKTION ENTDECKEN</a></div>`;
    return;
  }
  let sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  let disc=0;
  let promoLine='';
  if(appliedPromo){
    disc=Math.round(sub*appliedPromo.percent/100);
    promoLine=`<div class="summary-row discount"><span>CODE ${appliedPromo.code}</span><span>−€ ${disc.toLocaleString('de-DE')}</span></div>`;
  }
  const total2=sub-disc;

  el.innerHTML=`
  <div class="cart-layout">
    <div>
      <div class="cart-items">
        ${cart.map(item=>`
        <div class="cart-item" id="ci-${item.id}">
          <div class="item-img" onclick="window.location='produkt-${item.id}.html'">${item.emoji}</div>
          <div class="item-details">
            <div class="item-cat">${(item.cat||'MODE').toUpperCase()}</div>
            <div class="item-name" onclick="window.location='produkt-${item.id}.html'">${item.name}</div>
            <div class="item-color">GRÖSSE: UNIVERSAL</div>
            <div class="item-qty">
              <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
            </div>
            <button class="item-remove" onclick="removeItem(${item.id})">× ENTFERNEN</button>
          </div>
          <div class="item-right">
            <div class="item-price">€ ${(item.price*item.qty).toLocaleString('de-DE')}</div>
            ${item.originalPrice&&item.originalPrice!==item.price?`<div class="item-original">€ ${(item.originalPrice*item.qty).toLocaleString('de-DE')}</div>`:''}
          </div>
        </div>`).join('')}
      </div>
    </div>
    <div>
      <div class="summary-box">
        <div class="summary-title">BESTELLÜBERSICHT</div>
        <div class="summary-row"><span>ZWISCHENSUMME</span><span>€ ${sub.toLocaleString('de-DE')}</span></div>
        ${promoLine}
        <div class="summary-row"><span>VERSAND</span><span style="color:#4CAF50">KOSTENLOS</span></div>
        <div class="summary-row"><span>MwSt. (19%)</span><span>enthalten</span></div>
        <div class="summary-total"><span>GESAMT</span><span>€ ${total2.toLocaleString('de-DE')}</span></div>
        <button class="checkout-btn" onclick="checkout()">ZUR KASSE →</button>
        <p class="secure-note">Sicher & verschlüsselt bezahlen</p>
        <div class="payment-icons">
          <div class="pay-icon">VISA</div>
          <div class="pay-icon">MC</div>
          <div class="pay-icon">PayPal</div>
          <div class="pay-icon">Klarna</div>
        </div>
      </div>
    </div>
  </div>`;
}

function changeQty(id,d){
  const i=cart.find(x=>x.id===id);
  if(!i)return;
  i.qty+=d;
  if(i.qty<=0)cart=cart.filter(x=>x.id!==id);
  saveCart();renderCart();
}
function removeItem(id){
  cart=cart.filter(x=>x.id!==id);
  saveCart();renderCart();
  showToast('Artikel entfernt');
}
function checkout(){
  if(!currentUser){openAuth();return;}
  showToast('Vielen Dank für Ihre Bestellung! ✦');
  cart=[];appliedPromo=null;
  localStorage.removeItem('lnAppliedPromo');
  saveCart();renderCart();
}
function applyPromo(){
  const code=document.getElementById('promoInput').value.trim().toUpperCase();
  const msg=document.getElementById('promoMsg');
  const found=promoCodes.find(c=>c.code===code);
  if(found){
    appliedPromo=found;
    localStorage.setItem('lnAppliedPromo',JSON.stringify(found));
    msg.textContent='✓ CODE AKTIV – '+found.percent+'% RABATT';
    msg.className='promo-msg promo-ok';
    renderCart();showToast('Code '+found.code+' aktiviert! −'+found.percent+'%');
  }else{
    msg.textContent='✗ UNGÜLTIGER CODE';
    msg.className='promo-msg promo-err';
  }
}

// Auth
function openAuth(){document.getElementById('authModal').classList.add('open');}
function closeAuth(){document.getElementById('authModal').classList.remove('open');}
function doLogin(){
  const e=document.getElementById('loginEmail').value.trim();
  const p=document.getElementById('loginPass').value;
  const msg=document.getElementById('loginMsg');
  if(e===ADMIN_EMAIL&&p===ADMIN_PASS){
    currentUser={name:'Admin',email:ADMIN_EMAIL,isAdmin:true};
    localStorage.setItem('lnCurrentUser',JSON.stringify(currentUser));
    msg.style.color='#4CAF50';msg.textContent='✓ Willkommen Admin!';
    setTimeout(()=>{closeAuth();renderCart();},600);return;
  }
  const u=users.find(x=>x.email===e&&x.password===p);
  if(u){currentUser=u;localStorage.setItem('lnCurrentUser',JSON.stringify(u));msg.style.color='#4CAF50';msg.textContent='✓ Willkommen, '+u.name+'!';setTimeout(()=>{closeAuth();},600);}
  else{msg.style.color='#f44336';msg.textContent='✗ E-Mail oder Passwort falsch';}
}

// Menu
let menuOpen=false;
function toggleMenu(){menuOpen=!menuOpen;document.getElementById('hamburger').classList.toggle('open',menuOpen);document.getElementById('navMenu').classList.toggle('open',menuOpen);}
document.getElementById('authModal').addEventListener('click',function(e){if(e.target===this)closeAuth();});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

renderCart();
</script>
</body>
</html>
